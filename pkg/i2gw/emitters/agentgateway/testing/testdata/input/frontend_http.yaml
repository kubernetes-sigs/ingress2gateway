apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-frontend-http
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/http1-max-headers: "120"
    nginx.ingress.kubernetes.io/http1-idle-timeout: "45s"
    nginx.ingress.kubernetes.io/http2-window-size: "65535"
    nginx.ingress.kubernetes.io/http2-connection-window-size: "131070"
    nginx.ingress.kubernetes.io/http2-frame-size: "16384"
    nginx.ingress.kubernetes.io/http2-keepalive-interval: "30s"
    nginx.ingress.kubernetes.io/http2-keepalive-timeout: "10s"
spec:
  ingressClassName: nginx
  rules:
  - host: frontend-http.example.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: echo-backend
            port:
              number: 8080
