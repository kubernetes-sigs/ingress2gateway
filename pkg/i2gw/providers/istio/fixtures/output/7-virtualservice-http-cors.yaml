apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cors-all-fields
  namespace: bookinfo
spec:
  hostnames:
  - bookinfo.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /productpage
    backendRefs:
    - name: productpage
      namespace: bookinfo
      port: 9080
      weight: 0
    filters:
    - type: CORS
      cors:
        allowOrigins:
        - "https://bookinfo.example.com"
        - "https://dashboard.*"
        allowMethods:
        - GET
        - POST
        allowHeaders:
        - x-custom-header
        - authorization
        exposeHeaders:
        - x-request-id
        maxAge: 86400
        allowCredentials: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cors-minimal
  namespace: bookinfo
spec:
  hostnames:
  - bookinfo.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: api
      namespace: bookinfo
      port: 8080
      weight: 0
    filters:
    - type: CORS
      cors:
        allowOrigins:
        - "https://example.com"
